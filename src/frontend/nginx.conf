server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
    location /api/users/ {
        proxy_pass http://user-service:5001/users/;
        proxy_set_header Host $host;
    }

    location /api/users {
        proxy_pass http://user-service:5001/users;
        proxy_set_header Host $host;
    }

    location /api/orders/ {
        proxy_pass http://order-service:5002/orders/;
        proxy_set_header Host $host;
    }

    location /api/orders {
        proxy_pass http://order-service:5002/orders;
        proxy_set_header Host $host;
    }
}
