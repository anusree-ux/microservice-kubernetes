apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels: { app: order-service }
  template:
    metadata:
      labels: { app: order-service }
    spec:
      containers:
        - name: order-service
          image: anusree15/order-service:6
          ports: [{ containerPort: 5002 }]
          env:
            - name: DATABASE_URL
              value: postgres://appuser:apppassword@postgres:5432/appdb
            - name: USER_SERVICE_URL
              value: http://user-service:5001
          readinessProbe:
            httpGet: { path: /health, port: 5002 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector: { app: order-service }
  ports: [{ port: 5002, targetPort: 5002 }]
