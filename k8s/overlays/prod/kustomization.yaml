apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      environment: prod
    includeSelectors: false

patches:
  - path: replica-patch.yaml
    target:
      kind: Deployment
      name: user-service
  - path: replica-patch.yaml
    target:
      kind: Deployment
      name: order-service
