apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels: { app: user-service }
  template:
    metadata:
      labels: { app: user-service }
    spec:
      containers:
        - name: user-service
          image: anusree15/user-service:latest
          ports: [{ containerPort: 5001 }]
          env:
            - name: DATABASE_URL
              value: postgres://appuser:apppassword@postgres:5432/appdb
          readinessProbe:
            httpGet: { path: /health, port: 5001 }
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
spec:
  selector: { app: user-service }
  ports: [{ port: 5001, targetPort: 5001 }]
